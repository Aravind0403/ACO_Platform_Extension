<svg viewBox="0 0 860 540" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6c7086"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#89b4fa"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#cba6f7"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a6e3a1"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f38ba8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="540" fill="#1e1e2e" rx="12"/>

  <!-- Title -->
  <text x="430" y="32" text-anchor="middle" fill="#cdd6f4" font-size="13" font-weight="600" letter-spacing="0.04em">ACO PLATFORM EXTENSION — SCHEDULING FLOW</text>

  <!-- Lane labels -->
  <text x="18" y="100" fill="#6c7086" font-size="9" letter-spacing="0.1em">SUBMISSION</text>
  <text x="18" y="220" fill="#6c7086" font-size="9" letter-spacing="0.1em">KUBERNETES</text>
  <text x="18" y="370" fill="#6c7086" font-size="9" letter-spacing="0.1em">ACO ENGINE</text>
  <text x="18" y="490" fill="#6c7086" font-size="9" letter-spacing="0.1em">OBSERVABILITY</text>

  <!-- Lane dividers -->
  <line x1="100" y1="55" x2="845" y2="55" stroke="#313244" stroke-width="1"/>
  <line x1="100" y1="170" x2="845" y2="170" stroke="#313244" stroke-width="1"/>
  <line x1="100" y1="310" x2="845" y2="310" stroke="#313244" stroke-width="1"/>
  <line x1="100" y1="450" x2="845" y2="450" stroke="#313244" stroke-width="1"/>

  <!-- ROW 1: Submission -->
  <rect x="110" y="70" width="120" height="52" rx="6" fill="#313244" stroke="#45475a" stroke-width="1.5"/>
  <text x="170" y="91" text-anchor="middle" fill="#cdd6f4" font-weight="600">Pod</text>
  <text x="170" y="108" text-anchor="middle" fill="#6c7086" font-size="10">gpu: nvidia / tenant: prod</text>

  <line x1="230" y1="96" x2="295" y2="96" stroke="#6c7086" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="295" y="70" width="130" height="52" rx="6" fill="#313244" stroke="#45475a" stroke-width="1.5"/>
  <text x="360" y="91" text-anchor="middle" fill="#cdd6f4" font-weight="600">K8s API Server</text>
  <text x="360" y="108" text-anchor="middle" fill="#6c7086" font-size="10">schedules via extender</text>

  <line x1="425" y1="96" x2="490" y2="96" stroke="#6c7086" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="490" y="70" width="140" height="52" rx="6" fill="#313244" stroke="#45475a" stroke-width="1.5"/>
  <text x="560" y="91" text-anchor="middle" fill="#cdd6f4" font-weight="600">Default Scheduler</text>
  <text x="560" y="108" text-anchor="middle" fill="#6c7086" font-size="10">pre-filter + passes list</text>

  <!-- ROW 2: Extender -->
  <rect x="155" y="175" width="500" height="75" rx="8" fill="none" stroke="#89b4fa" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <text x="662" y="190" fill="#89b4fa" font-size="9" letter-spacing="0.06em" opacity="0.7">FastAPI Extender · :8080</text>

  <rect x="170" y="185" width="130" height="52" rx="6" fill="#1e3a5f" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="235" y="206" text-anchor="middle" fill="#89b4fa" font-weight="600">POST /filter</text>
  <text x="235" y="223" text-anchor="middle" fill="#89b4fa" font-size="10" opacity="0.7">GPU label · CPU · Memory</text>

  <rect x="490" y="185" width="145" height="52" rx="6" fill="#1e3a5f" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="562" y="206" text-anchor="middle" fill="#89b4fa" font-weight="600">POST /prioritize</text>
  <text x="562" y="223" text-anchor="middle" fill="#89b4fa" font-size="10" opacity="0.7">returns scores 0–10</text>

  <path d="M560,122 L560,155 L235,155 L235,185" stroke="#89b4fa" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)" opacity="0.8"/>
  <line x1="300" y1="211" x2="490" y2="211" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#arr-blue)" opacity="0.8"/>
  <text x="395" y="205" text-anchor="middle" fill="#89b4fa" font-size="9" opacity="0.7">filtered nodes</text>

