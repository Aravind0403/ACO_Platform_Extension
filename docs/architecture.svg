  <rect x="155" y="315" width="380" height="85" rx="8" fill="none" stroke="#cba6f7" stroke-width="1" stroke-dasharray="4,3" opacity="0.35"/>
  <text x="545" y="330" fill="#cba6f7" font-size="9" letter-spacing="0.06em" opacity="0.6">ACO Engine</text>

  <rect x="170" y="325" width="150" height="64" rx="6" fill="#2a1f3d" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="245" y="348" text-anchor="middle" fill="#cba6f7" font-weight="600">CostEngine</text>
  <text x="245" y="364" text-anchor="middle" fill="#cba6f7" font-size="10" opacity="0.75">reliability × cost_eff</text>
  <text x="245" y="378" text-anchor="middle" fill="#cba6f7" font-size="10" opacity="0.75">× sla_headroom × EMA</text>

  <rect x="360" y="325" width="155" height="64" rx="6" fill="#2a1f3d" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="437" y="348" text-anchor="middle" fill="#cba6f7" font-weight="600">Pheromone Table</text>
  <text x="437" y="364" text-anchor="middle" fill="#cba6f7" font-size="10" opacity="0.75">per-tenant · ρ=0.05 evap</text>
  <text x="437" y="378" text-anchor="middle" fill="#cba6f7" font-size="10" opacity="0.75">deposit Q/score on winner</text>

  <path d="M562,237 L562,290 L245,290 L245,325" stroke="#cba6f7" stroke-width="1.5" fill="none" marker-end="url(#arr-purple)" opacity="0.7"/>
  <line x1="320" y1="357" x2="360" y2="357" stroke="#cba6f7" stroke-width="1.5" marker-end="url(#arr-purple)" opacity="0.7"/>

  <!-- Node Pool -->
  <rect x="575" y="315" width="255" height="88" rx="6" fill="#313244" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="702" y="338" text-anchor="middle" fill="#a6e3a1" font-weight="600">GPU Node Pool</text>

  <rect x="587" y="347" width="44" height="22" rx="3" fill="#1a2e1a" stroke="#a6e3a1" stroke-width="1"/>
  <text x="609" y="362" text-anchor="middle" fill="#a6e3a1" font-size="9">CPU</text>
  <rect x="637" y="347" width="36" height="22" rx="3" fill="#1a2e1a" stroke="#a6e3a1" stroke-width="1"/>
  <text x="655" y="362" text-anchor="middle" fill="#a6e3a1" font-size="9">T4</text>
  <rect x="679" y="347" width="38" height="22" rx="3" fill="#1a2e1a" stroke="#a6e3a1" stroke-width="1"/>
  <text x="698" y="362" text-anchor="middle" fill="#a6e3a1" font-size="9">A10</text>
  <rect x="723" y="347" width="42" height="22" rx="3" fill="#1a2e1a" stroke="#a6e3a1" stroke-width="1"/>
  <text x="744" y="362" text-anchor="middle" fill="#a6e3a1" font-size="9">V100</text>
  <rect x="771" y="347" width="42" height="22" rx="3" fill="#1a2e1a" stroke="#a6e3a1" stroke-width="1"/>
  <text x="792" y="362" text-anchor="middle" fill="#a6e3a1" font-size="9">P100</text>

  <text x="655" y="386" text-anchor="middle" fill="#a6e3a1" font-size="8" opacity="0.6">$0.45/hr</text>
  <text x="698" y="386" text-anchor="middle" fill="#a6e3a1" font-size="8" opacity="0.6">$1.20/hr</text>
  <text x="744" y="386" text-anchor="middle" fill="#a6e3a1" font-size="8" opacity="0.6">$3.20/hr</text>
  <text x="792" y="386" text-anchor="middle" fill="#a6e3a1" font-size="8" opacity="0.6">$2.10/hr</text>

  <line x1="515" y1="357" x2="575" y2="357" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#arr-green)" opacity="0.8"/>
  <text x="545" y="350" text-anchor="middle" fill="#a6e3a1" font-size="9" opacity="0.7">bind</text>

  <!-- ROW 4: Observability -->
  <rect x="200" y="462" width="130" height="48" rx="6" fill="#313244" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="265" y="483" text-anchor="middle" fill="#f38ba8" font-weight="600">Prometheus</text>
  <text x="265" y="499" text-anchor="middle" fill="#f38ba8" font-size="10" opacity="0.7">scrapes /metrics · :9090</text>

  <rect x="380" y="462" width="130" height="48" rx="6" fill="#313244" stroke="#fab387" stroke-width="1.5"/>
  <text x="445" y="483" text-anchor="middle" fill="#fab387" font-weight="600">Grafana</text>
  <text x="445" y="499" text-anchor="middle" fill="#fab387" font-size="10" opacity="0.7">pheromone · cost · P99</text>

  <path d="M235,400 L235,430 L265,430 L265,462" stroke="#f38ba8" stroke-width="1.2" fill="none" stroke-dasharray="4,3" marker-end="url(#arr-red)" opacity="0.6"/>
  <line x1="330" y1="486" x2="380" y2="486" stroke="#fab387" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>

  <rect x="600" y="462" width="230" height="48" rx="6" fill="#1e1e2e" stroke="#45475a" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="715" y="483" text-anchor="middle" fill="#6c7086" font-size="10">Terraform → GKE cluster</text>
  <text x="715" y="499" text-anchor="middle" fill="#6c7086" font-size="10">+ GPU node pools (5 tiers)</text>

  <!-- Legend -->
  <line x1="110" y1="519" x2="122" y2="519" stroke="#89b4fa" stroke-width="2"/>
  <text x="128" y="523" fill="#6c7086" font-size="9">Extender protocol</text>
  <line x1="232" y1="519" x2="244" y2="519" stroke="#cba6f7" stroke-width="2"/>
  <text x="250" y="523" fill="#6c7086" font-size="9">ACO scoring</text>
  <line x1="330" y1="519" x2="342" y2="519" stroke="#a6e3a1" stroke-width="2"/>
  <text x="348" y="523" fill="#6c7086" font-size="9">Pod binding</text>
  <line x1="422" y1="519" x2="434" y2="519" stroke="#f38ba8" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="440" y="523" fill="#6c7086" font-size="9">Metrics scrape</text>
</svg>
